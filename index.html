<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MagicMaster Profile</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0a0a0a;
      --text: #f0f0f0;
      --text-sub: #aaaaaa;
      --pill-bg: #5b21b6;
      --pill-text: #e9d5ff;
      --icon-filter: invert(1);
      --border: rgba(255,255,255,0.1);
    }
    .light {
      --bg: #f5f5f5;
      --text: #111111;
      --text-sub: #555555;
      --pill-bg: #7c3aed;
      --pill-text: #ffffff;
      --icon-filter: invert(0);
      --border: rgba(0,0,0,0.12);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: background 0.4s ease, color 0.4s ease;
      padding: 5rem 1.5rem 4rem;
    }

    /* ── Theme button ── */
    #theme-btn {
      position: fixed;
      top: 1.1rem;
      left: 1.1rem;
      background: none;
      border: 1.5px solid var(--border);
      border-radius: 50%;
      width: 42px; height: 42px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: border-color 0.3s, background 0.3s;
      z-index: 100;
    }
    #theme-btn:hover { background: var(--border); }
    #theme-btn svg { width: 20px; height: 20px; fill: var(--text); transition: fill 0.3s; }

    /* ── Hero ── */
    .hero { text-align: center; animation: fadeUp 0.7s ease both; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* "Hi, I'm" line — normal readable size */
    .hi-line {
      font-family: 'Syne', sans-serif;
      font-size: clamp(1.4rem, 4vw, 2rem);
      font-weight: 700;
      color: var(--text);
      margin-bottom: 0.3rem;
    }

    /* "Magic_Master" pill — slightly bigger than hi-line */
    .name-pill {
      display: inline-block;
      background: var(--pill-bg);
      color: var(--pill-text);
      font-family: 'Syne', sans-serif;
      font-size: clamp(1.7rem, 5.5vw, 2.6rem);
      font-weight: 800;
      padding: 0.08em 0.4em;
      border-radius: 14px;
      letter-spacing: 0.01em;
      transition: background 0.4s, color 0.4s;
    }

    .sub {
      margin-top: 1rem;
      color: var(--text-sub);
      font-size: 0.95rem;
      line-height: 1.75;
      animation: fadeUp 0.7s 0.15s ease both;
    }

    /* ── Tech icons ── */
    .section-label {
      margin-top: 2.2rem;
      font-family: 'Syne', sans-serif;
      font-size: 0.78rem;
      letter-spacing: 0.13em;
      text-transform: uppercase;
      color: var(--text-sub);
      animation: fadeUp 0.7s 0.25s ease both;
    }

    .icons-row {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      justify-content: center;
      margin-top: 1rem;
      animation: fadeUp 0.7s 0.35s ease both;
    }

    .icon-item {
      display: flex; flex-direction: column; align-items: center; gap: 0.3rem;
      opacity: 0.85;
      transition: opacity 0.2s, transform 0.2s;
    }
    .icon-item:hover { opacity: 1; transform: translateY(-3px); }

    .icon-item img {
      width: 40px; height: 40px;
      object-fit: contain;
      border-radius: 8px;
    }
    /* default filter for mono icons */
    .icon-item img.mono { filter: var(--icon-filter); transition: filter 0.4s; }

    .icon-item span {
      font-size: 0.63rem;
      color: var(--text-sub);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    /* ── Social ── */
    .social-row {
      display: flex; gap: 1.8rem;
      margin-top: 2.6rem;
      justify-content: center;
      animation: fadeUp 0.7s 0.5s ease both;
    }

    .social-btn {
      display: flex; flex-direction: column; align-items: center; gap: 0.4rem;
      cursor: pointer; opacity: 0.8;
      transition: opacity 0.2s, transform 0.2s;
      background: none; border: none;
      color: var(--text-sub);
      font-family: inherit; font-size: 0.65rem;
      letter-spacing: 0.1em; text-transform: uppercase;
    }
    .social-btn:hover { opacity: 1; transform: translateY(-3px); }
    .social-btn img { width: 34px; height: 34px; }
    .social-btn img.mono { filter: var(--icon-filter); transition: filter 0.4s; }

    /* ── Toast ── */
    #toast {
      position: fixed; bottom: 2rem; left: 50%;
      transform: translateX(-50%) translateY(12px);
      background: var(--pill-bg); color: #fff;
      padding: 0.5rem 1.2rem; border-radius: 8px;
      font-size: 0.8rem; opacity: 0; pointer-events: none;
      transition: opacity 0.25s, transform 0.25s;
      white-space: nowrap; z-index: 200;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

  <!-- Theme toggle -->
  <button id="theme-btn" aria-label="Toggle theme">
    <svg id="theme-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M12 4.5a.75.75 0 0 1 .75.75v1.5a.75.75 0 0 1-1.5 0v-1.5A.75.75 0 0 1 12 4.5ZM12 16.5a.75.75 0 0 1 .75.75v1.5a.75.75 0 0 1-1.5 0v-1.5a.75.75 0 0 1 .75-.75ZM4.5 12a.75.75 0 0 1 .75-.75h1.5a.75.75 0 0 1 0 1.5h-1.5A.75.75 0 0 1 4.5 12ZM16.5 12a.75.75 0 0 1 .75-.75h1.5a.75.75 0 0 1 0 1.5h-1.5a.75.75 0 0 1-.75-.75ZM6.697 7.757a.75.75 0 0 1 1.06-1.06l1.061 1.06a.75.75 0 1 1-1.061 1.061L6.697 7.757ZM15.182 16.243a.75.75 0 0 1 1.06-1.061l1.061 1.06a.75.75 0 0 1-1.06 1.062l-1.061-1.061ZM7.757 17.303a.75.75 0 0 1-1.06-1.06l1.06-1.062a.75.75 0 0 1 1.062 1.061l-1.062 1.061ZM16.243 8.818a.75.75 0 0 1-1.061-1.061l1.06-1.06a.75.75 0 0 1 1.062 1.06l-1.061 1.061ZM12 8.25a3.75 3.75 0 1 0 0 7.5 3.75 3.75 0 0 0 0-7.5Z"/>
    </svg>
  </button>

  <div class="hero">

    <!-- "Hi, I'm" smaller -->
    <div class="hi-line">Hi, I'm</div>

    <!-- "Magic_Master" in purple pill, slightly bigger -->
    <div class="name-pill">Magic_Master</div>

    <p class="sub">
      I am 14 years old and a scripter<br/>
      I enjoy creating Eploit scripts and developing games.
    </p>

    <p class="section-label">Languages &amp; Tools</p>

    <div class="icons-row">

      <!-- Lua -->
      <div class="icon-item">
        <img src="https://www.lua.org/images/lua-logo.gif" alt="Lua" style="background:#1a1a2e;border-radius:8px;padding:3px;"/>
        <span>Lua</span>
      </div>

      <!-- Luau -->
      <div class="icon-item">
        <img src="https://raw.githubusercontent.com/immagicmaster/MagicMaster/refs/heads/main/Luauicon.png" alt="Luau"/>
        <span>Luau</span>
      </div>

      <!-- Roblox Studio -->
      <div class="icon-item">
        <img src="https://raw.githubusercontent.com/immagicmaster/MagicMaster/refs/heads/main/RobloxStudio.png" alt="Roblox Studio"/>
        <span>Roblox</span>
      </div>

      <!-- VS Code -->
      <div class="icon-item">
        <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/vscode/vscode-original.svg" alt="VS Code"/>
        <span>VS Code</span>
      </div>

      <!-- Python -->
      <div class="icon-item">
        <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/python/python-original.svg" alt="Python"/>
        <span>Python</span>
      </div>

      <!-- JavaScript -->
      <div class="icon-item">
        <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/javascript/javascript-original.svg" alt="JavaScript" style="border-radius:6px;"/>
        <span>JS</span>
      </div>

    </div>

    <!-- Social -->
    <div class="social-row">
      <button class="social-btn" id="github-btn">
        <img class="mono" src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/github/github-original.svg" alt="GitHub"/>
        GitHub
      </button>
      <button class="social-btn" id="discord-btn">
        <svg width="34" height="34" viewBox="0 0 127.14 96.36" xmlns="http://www.w3.org/2000/svg">
          <path fill="#5865F2" d="M107.7 8.07A105.15 105.15 0 0 0 81.47 0a72.06 72.06 0 0 0-3.36 6.83 97.68 97.68 0 0 0-29.11 0A72.37 72.37 0 0 0 45.64 0a105.89 105.89 0 0 0-26.25 8.09C2.79 32.65-1.71 56.6.54 80.21a105.73 105.73 0 0 0 32.17 16.15 77.7 77.7 0 0 0 6.89-11.11 68.42 68.42 0 0 1-10.85-5.18c.91-.66 1.8-1.34 2.66-2a75.57 75.57 0 0 0 64.32 0c.87.71 1.76 1.39 2.66 2a68.68 68.68 0 0 1-10.87 5.19 77 77 0 0 0 6.89 11.1 105.25 105.25 0 0 0 32.19-16.14c2.64-27.38-4.51-51.11-18.9-72.15zM42.45 65.69C36.18 65.69 31 60 31 53s5-12.74 11.43-12.74S54 46 53.89 53s-5.05 12.69-11.44 12.69zm42.24 0C78.41 65.69 73.25 60 73.25 53s5-12.74 11.44-12.74S96.23 46 96.12 53s-5.04 12.69-11.43 12.69z"/>
        </svg>
        Discord
      </button>
    </div>

  </div>

  <div id="toast"></div>

  <script>
    // ── Theme ──
    const btn  = document.getElementById('theme-btn');
    const icon = document.getElementById('theme-icon');
    const SUN  = `<path d="M12 4.5a.75.75 0 0 1 .75.75v1.5a.75.75 0 0 1-1.5 0v-1.5A.75.75 0 0 1 12 4.5ZM12 16.5a.75.75 0 0 1 .75.75v1.5a.75.75 0 0 1-1.5 0v-1.5a.75.75 0 0 1 .75-.75ZM4.5 12a.75.75 0 0 1 .75-.75h1.5a.75.75 0 0 1 0 1.5h-1.5A.75.75 0 0 1 4.5 12ZM16.5 12a.75.75 0 0 1 .75-.75h1.5a.75.75 0 0 1 0 1.5h-1.5a.75.75 0 0 1-.75-.75ZM6.697 7.757a.75.75 0 0 1 1.06-1.06l1.061 1.06a.75.75 0 1 1-1.061 1.061L6.697 7.757ZM15.182 16.243a.75.75 0 0 1 1.06-1.061l1.061 1.06a.75.75 0 0 1-1.06 1.062l-1.061-1.061ZM7.757 17.303a.75.75 0 0 1-1.06-1.06l1.06-1.062a.75.75 0 0 1 1.062 1.061l-1.062 1.061ZM16.243 8.818a.75.75 0 0 1-1.061-1.061l1.06-1.06a.75.75 0 0 1 1.062 1.06l-1.061 1.061ZM12 8.25a3.75 3.75 0 1 0 0 7.5 3.75 3.75 0 0 0 0-7.5Z"/>`;
    const MOON = `<path d="M21.75 12A9.75 9.75 0 0 1 9.104 21.524a.75.75 0 0 1 .228-1.482 8.25 8.25 0 0 0 9.126-9.126.75.75 0 0 1 1.482-.228A9.733 9.733 0 0 1 21.75 12ZM11.25 2.25A9.75 9.75 0 0 0 2.25 12c0 .342.017.68.051 1.013a.75.75 0 0 0 1.495-.089A8.25 8.25 0 0 1 11.25 3.75a.75.75 0 0 0 0-1.5ZM2.47 7.72a.75.75 0 0 0 1.06 1.06l1.5-1.5A.75.75 0 0 0 3.97 6.22l-1.5 1.5ZM20.53 7.72l-1.5-1.5a.75.75 0 1 0-1.06 1.06l1.5 1.5a.75.75 0 0 0 1.06-1.06ZM12 2.25a.75.75 0 0 0-.75.75v2.25a.75.75 0 0 0 1.5 0V3a.75.75 0 0 0-.75-.75ZM3 11.25a.75.75 0 0 0 0 1.5h2.25a.75.75 0 0 0 0-1.5H3Z"/>`;

    let dark = true;
    btn.addEventListener('click', () => {
      dark = !dark;
      document.body.classList.toggle('light', !dark);
      icon.innerHTML = dark ? SUN : MOON;
    });

    // ── Copy links ──
    const GITHUB_URL  = 'https://github.com/immagicmaster';
    const DISCORD_URL = 'dsc.gg/magichubv1';

    const toast = document.getElementById('toast');
    let timer;
    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add('show');
      clearTimeout(timer);
      timer = setTimeout(() => toast.classList.remove('show'), 2200);
    }
    function copyText(text, label) {
      navigator.clipboard.writeText(text)
        .then(() => showToast(label + ' link copied!'))
        .catch(() => {
          const el = document.createElement('textarea');
          el.value = text; document.body.appendChild(el);
          el.select(); document.execCommand('copy');
          document.body.removeChild(el);
          showToast(label + ' link copied!');
        });
    }
    document.getElementById('github-btn').addEventListener('click',  () => copyText(GITHUB_URL,  'GitHub'));
    document.getElementById('discord-btn').addEventListener('click', () => copyText(DISCORD_URL, 'Discord'));
  </script>
</body>
</html>
